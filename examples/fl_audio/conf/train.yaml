defaults:
  - train: 7b
  - _self_

experiment:
  exp_name: audio
  exp_dir: ./outputs_audio
  task:
    type: train
    backend: megatron
    entrypoint: ./flagscale/train/megatron/train_fl_audio.py
  runner:
    # single node multi gpu
    nnodes: 1
    nproc_per_node: 8
  envs:
    CUDA_VISIBLE_DEVICES: 0,1,2,3,4,5,6,7
    CUDA_DEVICE_MAX_CONNECTIONS: 1

action: run

hydra:
  run:
    dir: ${experiment.exp_dir}/hydra
