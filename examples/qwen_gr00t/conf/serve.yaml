defaults:
- _self_
- serve: qwen_gr00t

experiment:
  exp_name: qwen_gr00t_serve
  exp_dir: outputs/${experiment.exp_name}
  task:
    type: serve
    entrypoint: flagscale/serve/run_serve_qwen_gr00t.py
  runner:
    hostfile: null
    deploy:
      use_fs_serve: true
  envs:
    CUDA_VISIBLE_DEVICES: 0
    CUDA_DEVICE_MAX_CONNECTIONS: 1

action: run

hydra:
  run:
    dir: ${experiment.exp_dir}/hydra
