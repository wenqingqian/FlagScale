defaults:
  - _self_
  - train: 35b_a3b

experiment:
  exp_name: outputs_qwen35_35ba3b
  exp_dir: ./${experiment.exp_name}
  task:
    type: train
    backend: megatron
    entrypoint: ./flagscale/train/megatron/train_qwen35_vl.py
  runner:
    nnodes: 1
    nproc_per_node: 8
  envs:
    CUDA_VISIBLE_DEVICES: 0,1,2,3,4,5,6,7
    CUDA_DEVICE_MAX_CONNECTIONS: 1
    NVTE_APPLY_QK_LAYER_SCALING: 0
    NVTE_ALLOW_NONDETERMINISTIC_ALGO: 0

action: run

hydra:
  run:
    dir: ${experiment.exp_dir}/hydra
