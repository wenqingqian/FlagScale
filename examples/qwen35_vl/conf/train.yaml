defaults:
  - train: 27b
  - _self_

experiment:
  exp_name: train_qwen35_vl_27b
  exp_dir: ./${experiment.exp_name}
  task:
    type: train
    backend: megatron
    entrypoint: ./flagscale/train/megatron/train_qwen35_vl.py
  runner:
    nnodes: 1
    nproc_per_node: 8
    rdzv_backend: static
  envs:
    CUDA_VISIBLE_DEVICES: 0,1,2,3,4,5,6,7
    CUDA_DEVICE_MAX_CONNECTIONS: 1
    NVTE_APPLY_QK_LAYER_SCALING: 0
    NVTE_ALLOW_NONDETERMINISTIC_ALGO: 0

action: run

hydra:
  run:
    dir: ${experiment.exp_dir}/hydra
